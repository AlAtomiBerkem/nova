# Прод-оверрайд. Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  web:
    # 443 на этом сервере занят (VPN/Xray) → HTTPS вешаем на 8443, 80 редиректит.
    # Если 443 свободен — поменяй левую часть на 443:443 и redirect в nginx.prod.conf.
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-8443}:443'
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
