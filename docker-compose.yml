services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova}
      POSTGRES_DB: ${POSTGRES_DB:-nova}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nova}']
      interval: 5s
      timeout: 5s
      retries: 10
    # порт БД наружу НЕ открываем в интернет — биндим только на localhost
    # (для миграций/Prisma Studio с самого хоста). DB_PORT по умолчанию 5433,
    # чтобы не конфликтовать с другими локальными Postgres на 5432.
    ports:
      - '127.0.0.1:${DB_PORT:-5433}:5432'

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD:-nova}@db:5432/${POSTGRES_DB:-nova}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      IP_HASH_SALT: ${IP_HASH_SALT:-change-me}
      UPLOAD_DIR: /app/uploads
      ADMIN_URL: ${ADMIN_URL:-http://localhost:8080/admin.html}
      # сидер админа на старте
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-NOVA}
      # уведомления (пусто = канал выключен)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@nova.local}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      RESEND_TO: ${RESEND_TO:-}
      # антиспам
      RATE_WINDOW_MS: ${RATE_WINDOW_MS:-60000}
      RATE_MAX: ${RATE_MAX:-10}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
    volumes:
      - uploads:/app/uploads
    expose:
      - '4000'

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    # порты публикуются в оверрайдах: docker-compose.override.yml (локально, 8080)
    # или docker-compose.prod.yml (прод, 80 + 8443). В базовом файле — без портов,
    # т.к. compose объединяет ports аддитивно и убрать их из оверрайда нельзя.

volumes:
  db_data:
  uploads:
