<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — чат-виджет (прототип)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b121c;--bg-soft:#121b29;--bg-card:rgba(255,255,255,.04);
    --ink:#eef2f7;--muted:#9aa6b6;--line:rgba(238,242,247,.12);
    --accent:#d6ff3f;--glow:rgba(214,255,63,.35);
    --display:'Space Grotesk',sans-serif;--body:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#05080d;font-family:var(--body);min-height:100vh;display:flex;align-items:flex-end;justify-content:flex-end;padding:24px}

  /* кнопка-триггер на лендинге */
  .launcher{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:var(--accent);
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px var(--glow);transition:.3s;z-index:10}
  .launcher:hover{transform:scale(1.05)}
  .launcher svg{width:26px;height:26px}

  /* окно виджета */
  .widget{position:fixed;bottom:24px;right:24px;width:400px;max-width:calc(100vw - 32px);height:600px;max-height:calc(100vh - 48px);
    background:var(--bg);border:1px solid var(--line);border-radius:var(--r-lg,16px);border-radius:16px;display:flex;flex-direction:column;
    overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.5);z-index:20}
  .widget.hidden{display:none}

  .head{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--line)}
  .head .av{width:38px;height:38px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;color:#0b121c}
  .head .t1{font-family:var(--display);font-weight:600;color:var(--ink);font-size:15px}
  .head .t2{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .head .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .head .x{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1}

  .body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column}

  /* форма-визитка */
  .step-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .field label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:5px}
  .field input{width:100%;background:var(--bg-card);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--body);font-size:14px;padding:9px 12px;transition:border .3s}
  .field input:focus{outline:none;border-color:var(--accent)}
  .field input::placeholder{color:#6b7585}
  .field input.req{border-color:rgba(214,255,63,.5)}
  .divider{border-top:1px dashed var(--line);margin:6px 0 14px}

  /* пузыри */
  .bubble{padding:11px 14px;font-size:14px;line-height:1.5;margin-bottom:12px;max-width:80%;word-wrap:break-word}
  .bubble.client{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:14px 14px 14px 4px;color:var(--ink)}
  .bubble.admin{align-self:flex-end;background:var(--accent);color:#0b121c;font-weight:500;border-radius:14px 14px 4px 14px}
  .bubble .time{font-family:var(--mono);font-size:10px;margin-top:6px;opacity:.6}
  .bubble.admin .time{color:rgba(11,18,28,.55)}
  .bubble.client .time{color:var(--muted)}
  .attach{margin-top:8px;display:flex;align-items:center;gap:8px;background:rgba(214,255,63,.08);border:1px solid rgba(214,255,63,.25);border-radius:8px;padding:7px 10px;font-family:var(--mono);font-size:12px;color:var(--accent)}

  /* поле ввода */
  .composer{display:flex;align-items:center;gap:8px;padding:10px;border-top:1px solid var(--line)}
  .composer .clip{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:0 4px}
  .composer input{flex:1;background:var(--bg-card);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--body);font-size:14px;padding:10px 14px}
  .composer input:focus{outline:none;border-color:var(--accent)}
  .composer .send{background:var(--accent);border:none;border-radius:9px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .composer .send svg{width:20px;height:20px}
  .send-form{background:var(--accent);color:#0b121c;border:none;border-radius:10px;width:100%;padding:13px;font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-size:13px;margin-top:4px}
</style>
</head>
<body>

<button class="launcher" id="launcher" aria-label="Открыть чат">
  <svg viewBox="0 0 24 24" fill="none" stroke="#0b121c" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</button>

<div class="widget hidden" id="widget">
  <div class="head">
    <div class="av">N</div>
    <div>
      <div class="t1">NOVA — обсудим проект</div>
      <div class="t2"><span class="dot"></span>обычно отвечаю в течение часа</div>
    </div>
    <button class="x" id="close" aria-label="Закрыть">×</button>
  </div>

  <div class="body" id="body">
    <!-- ФОРМА-ВИЗИТКА (показывается до старта диалога) -->
    <div id="intake">
      <div class="step-label">Шаг 1 — пара слов о проекте</div>
      <div class="grid2">
        <div class="field"><label>Как обращаться</label><input id="f-name" placeholder="Имя"></div>
        <div class="field"><label>Email / telegram *</label><input id="f-contact" class="req" placeholder="@username"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Бюджет</label><input id="f-budget" placeholder="до 1500 €"></div>
        <div class="field"><label>Стек / инструменты</label><input id="f-stack" placeholder="React, Three.js"></div>
      </div>
      <div class="field" style="margin-bottom:12px"><label>Коротко об идее</label><input id="f-idea" placeholder="Что хотите сделать?"></div>
      <button class="send-form" id="start">Начать чат →</button>
    </div>

    <!-- ДИАЛОГ (показывается после старта) -->
    <div id="thread" style="display:none;flex-direction:column"></div>
  </div>

  <div class="composer" id="composer" style="display:none">
    <button class="clip" aria-label="Прикрепить файл">📎</button>
    <input id="msg" placeholder="Напишите сообщение…">
    <button class="send" id="send" aria-label="Отправить">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0b121c" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </div>
</div>

<script>
/* ============================================================
   ПРОТОТИП. Здесь данные мокаются. Точки подключения к API
   помечены [API] — замени fetch-заглушки на реальные вызовы
   из BACKEND_SPEC.md.
   ============================================================ */
const $ = s => document.querySelector(s);
const launcher=$('#launcher'), widget=$('#widget');
launcher.onclick=()=>{widget.classList.remove('hidden');launcher.style.display='none';};
$('#close').onclick=()=>{widget.classList.add('hidden');launcher.style.display='flex';};

// anonToken хранится в localStorage — клиент возвращается к своей переписке
let anonToken = localStorage.getItem('nova_anon') || null;
let convId = localStorage.getItem('nova_conv') || null;

function now(){return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});}

function addBubble(side, text, time, attachName){
  const t=$('#thread');
  const b=document.createElement('div');
  b.className='bubble '+side;
  b.innerHTML = text.replace(/</g,'&lt;');
  if(attachName){
    const a=document.createElement('div');a.className='attach';
    a.innerHTML='<span>🖼</span> '+attachName;
    b.appendChild(a);
  }
  const tm=document.createElement('div');tm.className='time';tm.textContent=time+(side==='admin'?' · NOVA':'');
  b.appendChild(tm);
  t.appendChild(b);
  $('#body').scrollTop=$('#body').scrollHeight;
}

// СТАРТ ДИАЛОГА — отправка формы-визитки
$('#start').onclick=async()=>{
  const contact=$('#f-contact').value.trim();
  if(!contact){ $('#f-contact').focus(); $('#f-contact').style.borderColor='#ff4d3d'; return; }
  const payload={
    clientName:$('#f-name').value.trim(),
    contact, contactType: contact.startsWith('@')?'TELEGRAM':'EMAIL',
    budget:$('#f-budget').value.trim(),
    stack:$('#f-stack').value.trim(),
    ideaSummary:$('#f-idea').value.trim()
  };
  // [API] POST /api/conversations  → { conversationId, anonToken }
  // const r = await fetch('/api/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  // const data = await r.json(); anonToken=data.anonToken; convId=data.conversationId;
  anonToken='demo-token'; convId='demo-conv';                       // мок
  localStorage.setItem('nova_anon',anonToken);
  localStorage.setItem('nova_conv',convId);

  $('#intake').style.display='none';
  $('#thread').style.display='flex';
  $('#composer').style.display='flex';
  if(payload.ideaSummary) addBubble('client', payload.ideaSummary, now());
  // автоприветствие (на проде — первое ADMIN-сообщение или автответ)
  setTimeout(()=>addBubble('admin','Спасибо! Получил вашу заявку, скоро отвечу 🙂', now()),700);
};

// ОТПРАВКА СООБЩЕНИЯ
function send(){
  const v=$('#msg').value.trim(); if(!v) return;
  addBubble('client', v, now());
  $('#msg').value='';
  // [API] POST /api/conversations/:id/messages  (заголовок X-Anon-Token)
  // fetch(`/api/conversations/${convId}/messages`,{method:'POST',headers:{'Content-Type':'application/json','X-Anon-Token':anonToken},body:JSON.stringify({body:v})});
}
$('#send').onclick=send;
$('#msg').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

/* [API] РЕАЛТАЙМ: подписка на ответы оператора через SSE
   const es = new EventSource(`/api/conversations/${convId}/stream`);
   es.onmessage = e => { const m=JSON.parse(e.data); if(m.sender==='ADMIN') addBubble('admin', m.body, now()); };
   На старте можно заменить на поллинг GET /messages раз в 4 сек.
*/
</script>
</body>
</html>
