<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — админка (прототип)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b121c;--bg-soft:#121b29;--bg-card:rgba(255,255,255,.04);
    --ink:#eef2f7;--muted:#9aa6b6;--line:rgba(238,242,247,.12);--line-soft:rgba(238,242,247,.06);
    --accent:#d6ff3f;--glow:rgba(214,255,63,.35);
    --display:'Space Grotesk',sans-serif;--body:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:300px 1fr;height:100vh}

  /* ЛЕВАЯ КОЛОНКА — список лидов */
  .side{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .brand{padding:18px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .brand .logo{font-family:var(--display);font-weight:700;font-size:19px}
  .brand .logo span{color:var(--accent)}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .brand .bell{margin-left:auto;color:var(--accent);font-size:20px;cursor:pointer}
  .filters{display:flex;gap:6px;padding:12px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:5px 12px;border-radius:40px;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:.2s}
  .chip.active{background:var(--accent);color:#0b121c;border-color:var(--accent);font-weight:700}
  .leads{flex:1;overflow-y:auto;min-height:0}
  .lead{padding:12px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:.2s}
  .lead:hover{background:var(--bg-soft)}
  .lead.active{background:rgba(214,255,63,.06);border-left:2px solid var(--accent);padding-left:12px}
  .lead .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .lead .name{font-family:var(--display);font-weight:600;font-size:14px}
  .lead .undot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .lead .preview{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lead .meta{font-family:var(--mono);font-size:10px;margin-top:3px;color:var(--muted)}
  .lead.unread .meta{color:var(--accent)}

  /* ПРАВАЯ КОЛОНКА — диалог */
  .main{display:flex;flex-direction:column;min-height:0}
  .conv-head{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .conv-head .av{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;color:#0b121c;font-size:14px}
  .conv-head .n{font-family:var(--display);font-weight:600;font-size:15px}
  .conv-head .c{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .conv-head .tags{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:40px;border:1px solid var(--line);color:var(--muted)}
  .tag.budget{color:var(--accent);border-color:rgba(214,255,63,.4)}
  .thread{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;min-height:0}
  .bubble{padding:10px 13px;font-size:14px;line-height:1.5;margin-bottom:10px;max-width:68%}
  .bubble.client{align-self:flex-start;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:14px 14px 14px 4px}
  .bubble.admin{align-self:flex-end;background:var(--accent);color:#0b121c;font-weight:500;border-radius:14px 14px 4px 14px}
  .bubble .time{font-family:var(--mono);font-size:10px;margin-top:5px;opacity:.6}
  .bubble.admin .time{color:rgba(11,18,28,.55)}
  .attach{margin-top:7px;display:flex;align-items:center;gap:7px;background:rgba(214,255,63,.08);border:1px solid rgba(214,255,63,.25);border-radius:7px;padding:6px 9px;font-family:var(--mono);font-size:11px;color:var(--accent)}
  .reply{padding:12px 18px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .reply input{flex:1;background:var(--bg-card);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--body);font-size:14px;padding:10px 14px}
  .reply input:focus{outline:none;border-color:var(--accent)}
  .reply .send{background:var(--accent);color:#0b121c;border:none;border-radius:9px;height:38px;padding:0 18px;display:flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--display);font-weight:600;font-size:13px}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:13px}

  /* экран логина */
  .login{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center}
  .login form{width:320px;display:flex;flex-direction:column;gap:12px;padding:28px;border:1px solid var(--line);border-radius:16px;background:var(--bg-soft)}
  .login .logo{font-family:var(--display);font-weight:700;font-size:24px;text-align:center;margin-bottom:6px}
  .login .logo span{color:var(--accent)}
  .login input{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--body);font-size:14px;padding:11px 14px}
  .login input:focus{outline:none;border-color:var(--accent)}
  .login button{background:var(--accent);color:#0b121c;border:none;border-radius:10px;padding:12px;font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer}
  .login .err{color:#ff4d3d;font-family:var(--mono);font-size:12px;text-align:center;min-height:14px}
</style>
</head>
<body>

<div class="login" id="login">
  <form id="login-form">
    <div class="logo">NO<span>/</span>VA</div>
    <input id="login-email" type="email" placeholder="email" autocomplete="username" required>
    <input id="login-pass" type="password" placeholder="пароль" autocomplete="current-password" required>
    <div class="err" id="login-err"></div>
    <button type="submit">Войти</button>
  </form>
</div>

<div class="app" id="app" style="display:none">

  <aside class="side">
    <div class="brand">
      <div class="logo">NO<span>/</span>VA</div>
      <div class="sub">админка</div>
      <div class="bell" title="Уведомления включены">🔔</div>
    </div>
    <div class="filters">
      <span class="chip active" data-f="new">Новые <span id="cnt-new"></span></span>
      <span class="chip" data-f="progress">В работе</span>
      <span class="chip" data-f="closed">Закрытые</span>
    </div>
    <div class="leads" id="leads"></div>
  </aside>

  <main class="main">
    <div id="conv-head" class="conv-head" style="display:none"></div>
    <div id="thread" class="thread"><div class="empty">Выберите диалог слева</div></div>
    <div id="reply" class="reply" style="display:none">
      <input id="reply-input" placeholder="Ответить…">
      <button class="send" id="reply-send">Отправить ↑</button>
    </div>
  </main>

</div>

<script>
/* ============================================================
   Админка NOVA — реальное подключение к /api/admin/* (JWT в cookie).
   ============================================================ */
const API='/api';
const $ = s=>document.querySelector(s);
const FILTER_TO_STATUS={new:'NEW',progress:'IN_PROGRESS',closed:'CLOSED'};

let activeFilter='new', activeId=null;
let leads=[];          // текущий список (по фильтру)
let es=null;           // EventSource админского потока

const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmt=ts=>new Date(ts).toLocaleString('ru',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const nameOf=l=>l.clientName||l.contact||'Без имени';

// ---------- ЛОГИН ----------
async function checkAuth(){
  const r=await fetch(`${API}/admin/me`,{credentials:'include'});
  return r.ok;
}
$('#login-form').onsubmit=async e=>{
  e.preventDefault();
  $('#login-err').textContent='';
  const r=await fetch(`${API}/admin/login`,{
    method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:$('#login-email').value,password:$('#login-pass').value})
  });
  if(!r.ok){ $('#login-err').textContent='Неверный email или пароль'; return; }
  startApp();
};

// ---------- СПИСОК ЛИДОВ ----------
async function loadLeads(){
  const status=FILTER_TO_STATUS[activeFilter];
  const r=await fetch(`${API}/admin/conversations?status=${status}`,{credentials:'include'});
  if(r.status===401){ location.reload(); return; }
  const {conversations}=await r.json();
  leads=conversations;
  renderLeads();
}
function isUnread(l){ const m=l.messages&&l.messages[0]; return !!(m&&m.sender==='CLIENT'&&!m.readAt); }
function renderLeads(){
  if(activeFilter==='new') $('#cnt-new').textContent=leads.length||'';
  $('#leads').innerHTML = leads.map(l=>{
    const last=l.messages&&l.messages[0];
    return `<div class="lead ${isUnread(l)?'unread':''} ${l.id===activeId?'active':''}" data-id="${l.id}">
      <div class="top"><span class="name">${esc(nameOf(l))}</span>${isUnread(l)?'<span class="undot"></span>':''}</div>
      <div class="preview">${esc(last?last.body:'—')}</div>
      <div class="meta">${esc(l.budget||'бюджет —')} · ${fmt(l.lastMessageAt)}</div>
    </div>`;
  }).join('') || '<div style="padding:20px;color:var(--muted);font-family:var(--mono);font-size:12px">Пусто</div>';
  document.querySelectorAll('.lead').forEach(el=>el.onclick=()=>openConv(el.dataset.id));
}

// ---------- ДИАЛОГ ----------
function bubbleHTML(m){
  const side=m.sender==='ADMIN'?'admin':'client';
  const att=(m.attachments||[]).map(a=>{
    const isImg=(a.mimeType||'').startsWith('image/');
    return `<div class="attach"><span>${isImg?'🖼':'📄'}</span> <a href="${API}/uploads/${a.id}" target="_blank" rel="noopener" style="color:inherit">${esc(a.fileName||'файл')}</a></div>`;
  }).join('');
  return `<div class="bubble ${side}">${esc(m.body)}${att}<div class="time">${fmt(m.createdAt)}${side==='admin'?' · вы':''}</div></div>`;
}
async function openConv(id){
  activeId=id;
  const r=await fetch(`${API}/admin/conversations/${id}`,{credentials:'include'});
  if(!r.ok) return;
  const {conversation:c}=await r.json();
  $('#conv-head').style.display='flex';
  $('#reply').style.display='flex';
  $('#conv-head').innerHTML=`
    <div class="av">${esc(nameOf(c)[0]||'?')}</div>
    <div><div class="n">${esc(nameOf(c))}</div><div class="c">${esc(c.contact)} · ${esc(c.contactType)}</div></div>
    <div class="tags">
      ${c.budget?`<span class="tag budget">${esc(c.budget)}</span>`:''}
      ${c.stack?`<span class="tag">${esc(c.stack)}</span>`:''}
      <span class="tag" id="status-toggle" style="cursor:pointer">${c.status==='CLOSED'?'↻ открыть':'✓ закрыть'}</span>
    </div>`;
  $('#thread').innerHTML=c.messages.map(bubbleHTML).join('');
  $('#thread').scrollTop=$('#thread').scrollHeight;
  $('#status-toggle').onclick=()=>setStatus(id, c.status==='CLOSED'?'IN_PROGRESS':'CLOSED');
  loadLeads(); // обновим счётчики/прочитанность
}

async function reply(){
  const v=$('#reply-input').value.trim(); if(!v||!activeId)return;
  $('#reply-input').value='';
  const r=await fetch(`${API}/admin/conversations/${activeId}/messages`,{
    method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({body:v})
  });
  if(!r.ok){ alert('Не отправлено'); return; }
  const {message}=await r.json();
  $('#thread').insertAdjacentHTML('beforeend',bubbleHTML(message));
  $('#thread').scrollTop=$('#thread').scrollHeight;
  loadLeads();
}
$('#reply-send').onclick=reply;
$('#reply-input').addEventListener('keydown',e=>{if(e.key==='Enter')reply();});

async function setStatus(id,status){
  await fetch(`${API}/admin/conversations/${id}`,{
    method:'PATCH',credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({status})
  });
  openConv(id);
}

// ---------- ФИЛЬТРЫ ----------
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active'); activeFilter=c.dataset.f; loadLeads();
});

// ---------- SSE: новые лиды и сообщения ----------
function subscribe(){
  if(es) es.close();
  es=new EventSource(`${API}/admin/stream`,{withCredentials:true});
  es.addEventListener('lead',()=>loadLeads());
  es.addEventListener('message',e=>{
    const {conversationId,message}=JSON.parse(e.data);
    if(conversationId===activeId && message.sender==='CLIENT'){
      $('#thread').insertAdjacentHTML('beforeend',bubbleHTML(message));
      $('#thread').scrollTop=$('#thread').scrollHeight;
    }
    loadLeads();
  });
}

// ---------- WEB-PUSH ----------
const urlB64ToUint8=b64=>{
  const pad='='.repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
};
async function setupPush(){
  if(!('serviceWorker'in navigator)||!('PushManager'in window)){ alert('Push не поддерживается этим браузером'); return; }
  const vr=await fetch(`${API}/admin/push/vapid`,{credentials:'include'});
  const {publicKey}=await vr.json();
  if(!publicKey){ alert('VAPID-ключи не настроены на сервере'); return; }
  const perm=await Notification.requestPermission();
  if(perm!=='granted'){ return; }
  const reg=await navigator.serviceWorker.register('/sw.js');
  await navigator.serviceWorker.ready;
  const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(publicKey)});
  await fetch(`${API}/admin/push/subscribe`,{
    method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(sub.toJSON())
  });
  $('.bell').textContent='🔔✓'; $('.bell').title='Push-уведомления включены';
}
$('.bell').onclick=setupPush;

// ---------- запуск ----------
async function startApp(){
  $('#login').style.display='none';
  $('#app').style.display='grid';
  await loadLeads();
  subscribe();
}
(async()=>{ if(await checkAuth()) startApp(); else $('#login').style.display='flex'; })();
</script>
</body>
</html>
