# Прод-конфиг nginx: self-signed HTTPS на IP, редирект 80→443.
# Монтируется поверх дефолтного конфига через docker-compose.prod.yml.

# HTTP → HTTPS (на этом сервере HTTPS опубликован на 8443, т.к. 443 занят VPN).
# Если перенесёшь HTTPS на 443 — поменяй редирект на https://$host$request_uri.
server {
    listen 80;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # --- API → backend ---
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: без буферизации, держим соединение долго
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }

    # --- статика ---
    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
